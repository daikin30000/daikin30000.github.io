<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かんじよむ れんしゅう</title>
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => console.log('SW registered'));
      }
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            background-color: #2b415d;
            background-image: radial-gradient(circle, #344f70 0%, #2b415d 100%);
            font-family: "BIZ UDPGothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            color: #ffffff;
            cursor: pointer;
            user-select: none;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #menu-screen {
            display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; width: 90%; max-width: 800px;
            padding-bottom: 80px;
        }

        .app-title {
            font-size: 2.4rem; font-weight: bold; text-shadow: 3px 3px 0px rgba(0,0,0,0.2); margin-bottom: 10px; text-align: center; line-height: 1.2;
            display: flex; flex-wrap: wrap; justify-content: center;
        }
        .app-title span { display: inline-block; white-space: pre; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; }

        .menu-item {
            background: rgba(255, 255, 255, 0.1); border: 2px solid #ffffff; padding: 15px 10px; font-size: 1.2rem;
            border-radius: 12px; transition: all 0.2s; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #display-screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; }
        #flashcard { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #display-reading { font-weight: bold; text-align: center; color: #ffeb3b; height: 1.2em; visibility: hidden; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 10px;}
        #display-kanji { font-weight: bold; text-align: center; white-space: nowrap; line-height: 1; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .bottom-btn {
            position: absolute; background: rgba(255, 255, 255, 0.2); border: 1px solid #fff; color: #fff; padding: 10px 20px;
            border-radius: 30px; font-size: 1rem; cursor: pointer; z-index: 20; text-decoration: none; display: flex; align-items: center;
        }
        #switch-button { left: 20px; bottom: 20px; }
        #home-button { right: 20px; bottom: 20px; display: none; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="app-title">　<span>かんじよむ</span>　<span>れんしゅう</span></div>
        <div class="menu-grid">
            <div class="menu-item" data-list="kanji01.txt">１ねんせい</div>
            <div class="menu-item" data-list="kanji02.txt">２ねんせい</div>
            <div class="menu-item" data-list="kanji03.txt">３ねんせい</div>
            <div class="menu-item" data-list="kanji04.txt">４ねんせい</div>
            <div class="menu-item" data-list="kanji05.txt">５ねんせい</div>
            <div class="menu-item" data-list="kanji06.txt">６ねんせい</div>
        </div>
    </div>

    <div id="display-screen">
        <div id="flashcard">
            <div id="display-reading">よみがな</div>
            <div id="display-kanji">漢字</div>
        </div>
    </div>

    <a href="index.html" id="switch-button" class="bottom-btn">もじれんしゅうへ</a>
    <div id="home-button" class="bottom-btn">はじめにもどる</div>

    <script>
        $(document).ready(function() {
            let originalPairs = []; let remainingPairs = []; let currentPair = null; let step = 0;

            function maximizeFontSize() {
                const $kanji = $('#display-kanji'); const $reading = $('#display-reading');
                const maxWidth = $(window).width() * 0.92; const maxHeight = $(window).height() * 0.6;
                const originalText = $kanji.text(); 
                $kanji.text("ああああああああ"); 

                let fontSize = 10; $kanji.css('font-size', fontSize + 'px');
                while ($kanji.width() < maxWidth && $kanji.height() < maxHeight && fontSize < 1000) { 
                    fontSize += 10; $kanji.css('font-size', fontSize + 'px'); 
                }
                while (($kanji.width() > maxWidth || $kanji.height() > maxHeight) && fontSize > 10) { 
                    fontSize -= 2; $kanji.css('font-size', fontSize + 'px'); 
                }
                $kanji.text(originalText); 
                $reading.css('font-size', (fontSize * 0.4) + 'px');
            }

            $('.menu-item').on('click', function(e) {
                e.stopPropagation();
                const fileName = $(this).data('list');
                $.get(fileName, function(data) {
                    originalPairs = data.split(/\r?\n/).filter(Boolean).map(line => {
                        const parts = line.split(','); return { q: parts[0], a: parts[1] || "" };
                    });
                    remainingPairs = []; step = 0;
                    $('#menu-screen, #switch-button').hide();
                    $('#display-screen').css('display', 'flex');
                    $('#home-button').show();
                    $('#display-reading').css('visibility', 'hidden').text("");
                    $('#display-kanji').text("はじめ！");
                    maximizeFontSize();
                });
            });

            $('body').on('click', function() {
                if (!$('#display-screen').is(':visible') || originalPairs.length === 0) return;
                if (step === 0 || step === 2) {
                    if (remainingPairs.length === 0) { 
                        remainingPairs = [...originalPairs]; 
                        for(let i=remainingPairs.length-1; i>0; i--){
                            let r = Math.floor(Math.random()*(i+1));
                            [remainingPairs[i], remainingPairs[r]] = [remainingPairs[r], remainingPairs[i]];
                        }
                    }
                    currentPair = remainingPairs.pop();
                    $('#display-reading').css('visibility', 'hidden').text(currentPair.a);
                    $('#display-kanji').text(currentPair.q);
                    maximizeFontSize();
                    step = 1;
                } else if (step === 1) {
                    $('#display-reading').css('visibility', 'visible');
                    step = 2;
                }
            });

            $('#home-button').on('click', function(e) {
                e.stopPropagation();
                $('#display-screen, #home-button').hide();
                $('#menu-screen, #switch-button').show();
                step = 0;
            });

            $(window).on('resize', function() { if ($('#display-screen').is(':visible')) maximizeFontSize(); });
        });
    </script>
</body>
</html>
